description = "✍️ Pair every drafted document with a Word (.docx) file. When the solicitor asks for a draft — claim form, particulars of claim, defence, witness statement, skeleton argument, advice/opinion — produce BOTH the markdown AND the .docx in the same directory. Word is what the court accepts and what clients open. Markdown is what the firm reads and diffs."

prompt = """
# ✍️ Draft-With-Docx — UK AI Brain

The solicitor said:

\"\"\"
{{args}}
\"\"\"

You are producing a legal document for the solicitor's matter. The firm's standing rule: every drafted document ships as a paired `.md` + `.docx` in the same directory, atomically. Markdown for the firm, Word for the court and the client.

## Step 1 — Detect the document type

Identify what the solicitor is asking you to draft:
- Statements of case (claim form under CPR Part 7/Part 8, particulars of claim, defence, reply, counterclaim, Part 20 claim)
- Applications (application notice Form N244, draft order, consent order, Tomlin order)
- Evidence (witness statement with statement of truth, exhibits, expert report)
- Advocacy (skeleton argument, position statement, chronology, case summary)
- Settlement (Part 36 offer, letter before claim under the Pre-Action Protocol, settlement agreement)
- Advisory (advice/opinion, instructions to counsel, attendance note, due-diligence report)

## Step 2 — Locate the matter folder

Find the matter folder under `~/Desktop/<firm-name>/<matter-folder>/`. If a `drafts/` subdir doesn't exist, create it:

!{mkdir -p drafts}

## Step 3 — Write the markdown draft

Produce the draft as markdown with a date-prefixed filename:

```
drafts/YYYY-MM-DD-<short-title>.md
```

## Step 4 — Pair with .docx (MANDATORY — same tool call window)

Convert the .md to .docx in the same directory:

!{pandoc "drafts/$(ls -t drafts/*.md | head -1 | xargs basename)" -o "drafts/$(ls -t drafts/*.md | head -1 | xargs basename .md).docx" --from=markdown+pipe_tables+yaml_metadata_block 2>&1 || echo "pandoc-missing"}

If pandoc reports missing, fall back:

!{python3 -c "import pypandoc, glob, os; latest = max(glob.glob('drafts/*.md'), key=os.path.getmtime); pypandoc.convert_file(latest, 'docx', outputfile=latest.replace('.md', '.docx'))" 2>&1}

## Step 5 — Verify both files exist

!{ls -la drafts/*.md drafts/*.docx | tail -4}

## Step 6 — Report to solicitor

Tell the solicitor:

> ✍️ Draft ready (paired):
> - `drafts/YYYY-MM-DD-<title>.md` — for the firm + diffs
> - `drafts/YYYY-MM-DD-<title>.docx` — for the court + client

NEVER report "draft ready" if only one of the two files exists.

## Why this rule

- UK courts accept Word, not markdown. Markdown-only = unfileable.
- Clients open Word. Markdown-only = unsendable.
- The firm's brain reads markdown. Docx-only = opaque to search and diff.

Both files, every time, same directory.
"""
